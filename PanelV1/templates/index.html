<!DOCTYPE html>
<html>
<head>
    <title>FeatherCloud Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        body { background-color: var(--bg); color: #e2e8f0; }
        .sidebar { width: 260px; height: 100vh; background: var(--card); position: fixed; padding: 20px; }
        .main { margin-left: 280px; padding: 40px; }
        .v-card { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid #2d3748; }
        .btn-grad { background: var(--accent); color: white; border: none; font-weight: 600; border-radius: 8px; transition: 0.3s; }
        .btn-grad:hover { opacity: 0.9; transform: translateY(-2px); color: white; }
        .progress { background-color: #2d3748; height: 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 class="text-primary mb-4">FeatherCloud</h2>
    <div class="mb-4">
        <small class="text-secondary">SYSTEM HEALTH</small>
        <div class="mt-2">CPU: {{ stats.cpu }}%</div>
        <div class="progress mb-2"><div class="progress-bar bg-primary" style="width: {{ stats.cpu }}%"></div></div>
        <div>RAM: {{ stats.ram }}%</div>
        <div class="progress"><div class="progress-bar bg-info" style="width: {{ stats.ram }}%"></div></div>
    </div>
    <hr>
    <a href="/logout" class="btn btn-outline-danger w-100 btn-sm">Logout</a>
</div>

<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1>Node Overview</h1>
        <button class="btn btn-grad px-4 py-2" data-bs-toggle="modal" data-bs-target="#createVps">+ Create Instance</button>
    </div>

    <div class="v-card">
        <table class="table table-dark">
            <thead><tr><th>Name</th><th>Hostname</th><th>Image</th><th>Status</th><th>Management</th></tr></thead>
            <tbody>
                {% for c in containers %}
                <tr>
                    <td>{{ c.name }}</td>
                    <td><span class="badge bg-secondary">{{ c.attrs.Config.Hostname }}</span></td>
                    <td>{{ c.attrs.Config.Image }}</td>
                    <td><span class="text-{{ 'success' if c.status == 'running' else 'danger' }}">● {{ c.status }}</span></td>
                    <td>
                        <a href="/action/{{ c.id }}/start" class="btn btn-sm btn-grad">Start</a>
                        <a href="/action/{{ c.id }}/ssh" class="btn btn-sm btn-info text-white">SSH</a>
                        <a href="/action/{{ c.id }}/stop" class="btn btn-sm btn-warning">Stop</a>
                        <a href="/action/{{ c.id }}/delete" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Remove</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="createVps" style="color: #333;">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="/create" method="POST">
                <div class="modal-header"><h5>Deploy New Instance</h5></div>
                <div class="modal-body">
                    <label>Instance Name</label><input type="text" name="name" class="form-control mb-3" required>
                    <label>Hostname</label><input type="text" name="hostname" class="form-control mb-3" placeholder="vps-01">
                    <label>Select OS Image</label>
                    <select name="image" class="form-select mb-3">
                        <option value="ubuntu">Ubuntu 22.04</option>
                        <option value="alpine">Alpine Linux (Lite)</option>
                        <option value="nginx">Nginx Web Server</option>
                        <option value="python:3.9-slim">Python Environment</option>
                    </select>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">Launch</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
                            </html>
