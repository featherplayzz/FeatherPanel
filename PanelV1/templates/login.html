<!DOCTYPE html>
<html>
<body style="background: #0b0e14; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
    <div style="background: #151921; padding: 40px; border-radius: 15px; width: 350px; text-align: center;">
        <h2 style="color: #3b82f6;">FeatherCloud</h2>
        <p>Login to your Control Panel</p>
        <form method="POST">
            <input type="text" name="user" placeholder="Username" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #333; background: #0b0e14; color: white;">
            <input type="password" name="pwd" placeholder="Password" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #333; background: #0b0e14; color: white;">
            <button type="submit" style="width: 100%; padding: 10px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; border-radius: 5px; cursor: pointer;">Access Dashboard</button>
        </form>
    </div>
</body>
</html>
