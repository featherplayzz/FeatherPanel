<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vpanel 3.1 | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #05070a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-color: #00d2ff;
            box-shadow: 0 0 0 0.25rem rgba(0, 210, 255, 0.25);
        }
        .btn-v {
            background: linear-gradient(45deg, #007bff, #00d2ff);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-v:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.4);
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-text text-info">VPANEL <span class="text-white">3.1</span></div>
    
    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label small text-secondary">USERNAME</label>
            <input type="text" name="user" class="form-control" placeholder="admin" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label small text-secondary">PASSWORD</label>
            <input type="password" name="pwd" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-v">AUTHENTICATE</button>
    </form>
    
    <div class="mt-4 text-center">
        <small class="text-secondary">© 2026 FeatherPlayz Cloud Systems</small>
    </div>
</div>

</body>
</html>
